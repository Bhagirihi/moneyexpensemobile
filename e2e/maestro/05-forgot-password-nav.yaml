# TC-005: Forgot password navigation + validation
appId: com.trivense.app
---
- runFlow:
    file: _bootstrap-guest.yaml
- tapOn:
    id: login-forgot-password
- extendedWaitUntil:
    visible: "Reset password"
    timeout: 15000
- tapOn: "Send reset link"
- extendedWaitUntil:
    visible: "Email is required"
    timeout: 10000
- tapOn: "Back to sign in"
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 15000
