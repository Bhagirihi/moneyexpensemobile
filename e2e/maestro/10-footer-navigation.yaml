# TC-010: Footer tab navigation cycle
appId: com.trivense.app
---
- runFlow:
    file: _bootstrap.yaml
- runFlow:
    when:
      visible:
        id: screen-login
    file: _login-qa.yaml
- extendedWaitUntil:
    visible:
      id: screen-home
    timeout: 90000
- tapOn:
    id: footer-tab-Analytics
- extendedWaitUntil:
    visible:
      id: screen-analytics
    timeout: 30000
- tapOn:
    id: footer-tab-Settings
- extendedWaitUntil:
    visible:
      id: screen-settings
    timeout: 30000
- tapOn:
    id: footer-tab-Home
- extendedWaitUntil:
    visible:
      id: screen-home
    timeout: 30000
