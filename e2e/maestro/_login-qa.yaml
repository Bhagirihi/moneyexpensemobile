# Sign in with QA credentials (env: QA_EMAIL, QA_PASSWORD)
appId: com.trivense.app
---
- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 30000
- tapOn: "you@example.com"
- inputText: ${QA_EMAIL}
- tapOn: "Your password"
- inputText: ${QA_PASSWORD}
- hideKeyboard
- tapOn:
    id: login-sign-in-button
- extendedWaitUntil:
    visible:
      id: screen-home
    timeout: 90000
